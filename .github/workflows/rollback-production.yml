name: Rollback Production

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Known good commit SHA to redeploy"
        required: true
      confirm:
        description: "Type ROLLBACK to confirm"
        required: true

jobs:
  rollback:
    name: Redeploy known good commit
    runs-on: ubuntu-latest
    if: ${{ inputs.confirm == 'ROLLBACK' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm install --no-audit --no-fund --prefer-offline

      - name: Build frontend
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Copy artifacts to VPS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 72.62.138.208
          username: root
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          source: "dist/,nginx.conf,Dockerfile.ci,docker-compose.yml"
          target: "/opt/aloclinica/"
          strip_components: 0
          timeout: 120s
          command_timeout: 20m

      - name: Rebuild and restart production container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 72.62.138.208
          username: root
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          timeout: 120s
          command_timeout: 20m
          script: |
            set -e
            cd /opt/aloclinica
            docker compose build --no-cache aloclinica-web
            docker compose up -d --force-recreate aloclinica-web
            docker image prune -f

      - name: Health check
        run: npm run health:production
        env:
          PROD_SITE_URL: https://aloclinica.com.br
          SUPABASE_PROJECT_REF: pwxvvimdtmvziynbspgx
