name: One-shot — configurar Mercado Pago no Supabase

# Roda manualmente uma vez via workflow_dispatch. Aplica as migrations MP e
# seta os secrets nas Edge Functions. Pode ser deletado depois.

on:
  workflow_dispatch:
    inputs:
      mp_access_token:
        description: "Mercado Pago Access Token (APP_USR-...)"
        required: true
        type: string
      mp_webhook_secret:
        description: "Mercado Pago Webhook Secret (assinatura)"
        required: true
        type: string
      app_url:
        description: "URL pública da aplicação"
        required: false
        type: string
        default: "https://aloclinica.com.br"

env:
  SUPABASE_PROJECT_REF: pwxvvimdtmvziynbspgx

jobs:
  setup:
    name: Sync secrets + migrations
    runs-on: ubuntu-latest
    steps:
      - name: Mask inputs
        run: |
          echo "::add-mask::${{ inputs.mp_access_token }}"
          echo "::add-mask::${{ inputs.mp_webhook_secret }}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Aplicar migrations Mercado Pago via Management API
        env:
          SBP_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -e
          for f in supabase/migrations/20260512_mercadopago_migration.sql supabase/migrations/20260512b_mercadopago_cleanup.sql; do
            echo "→ Aplicando $f"
            # Monta payload JSON com o conteúdo do SQL
            jq -Rs '{query: .}' "$f" > /tmp/payload.json
            # Curl com User-Agent que passa pelo Cloudflare
            HTTP_CODE=$(curl -sS -w "%{http_code}" -o /tmp/resp.txt \
              -X POST \
              -H "Authorization: Bearer $SBP_TOKEN" \
              -H "Content-Type: application/json" \
              -A "Mozilla/5.0 (compatible; aloclinica-deploy/1.0)" \
              "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_REF/database/query" \
              --data-binary @/tmp/payload.json)
            BODY=$(head -c 500 /tmp/resp.txt)
            echo "  HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
              echo "  body: $BODY"
              exit 1
            fi
          done

      - name: Setar secrets nas Edge Functions
        env:
          SBP_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          MP_TOKEN: ${{ inputs.mp_access_token }}
          MP_WEBHOOK: ${{ inputs.mp_webhook_secret }}
          APP_URL: ${{ inputs.app_url }}
        run: |
          set -e
          # Monta payload pelo jq pra escapar valores corretamente
          jq -n \
            --arg t "$MP_TOKEN" \
            --arg w "$MP_WEBHOOK" \
            --arg a "$APP_URL" \
            '[
              {name: "MERCADOPAGO_ACCESS_TOKEN", value: $t},
              {name: "MERCADOPAGO_WEBHOOK_SECRET", value: $w},
              {name: "APP_URL", value: $a}
            ]' > /tmp/secrets.json

          HTTP_CODE=$(curl -sS -w "%{http_code}" -o /tmp/resp.txt \
            -X POST \
            -H "Authorization: Bearer $SBP_TOKEN" \
            -H "Content-Type: application/json" \
            -A "Mozilla/5.0 (compatible; aloclinica-deploy/1.0)" \
            "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_REF/secrets" \
            --data-binary @/tmp/secrets.json)
          echo "Secrets HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
            head -c 500 /tmp/resp.txt
            exit 1
          fi

      - name: Summary
        run: |
          echo "## ✅ Setup Mercado Pago concluído" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Migrations aplicadas: 20260512_mercadopago_migration.sql, 20260512b_mercadopago_cleanup.sql" >> $GITHUB_STEP_SUMMARY
          echo "- Edge Function Secrets configurados: MERCADOPAGO_ACCESS_TOKEN, MERCADOPAGO_WEBHOOK_SECRET, APP_URL" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Próximo: trigger deploy normal (push em main) pra build do frontend pegar VITE_MERCADOPAGO_PUBLIC_KEY." >> $GITHUB_STEP_SUMMARY
