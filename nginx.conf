server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=(self), payment=(self), usb=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.gpteng.co https://meet.telemedicinaaloclinica.sbs https://www.googletagmanager.com https://www.google-analytics.com https://browser.sentry-cdn.com https://*.sentry.io https://sdk.mercadopago.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https: http:; media-src 'self' blob:; connect-src 'self' https://pwxvvimdtmvziynbspgx.supabase.co wss://pwxvvimdtmvziynbspgx.supabase.co http://72.62.138.208:8000 http://72.62.138.208:8042 http://72.62.138.208:3001 http://72.62.138.208:3200 https://meet.telemedicinaaloclinica.sbs wss://meet.telemedicinaaloclinica.sbs https://api.brevo.com https://api.mercadopago.com https://api.anthropic.com https://*.sentry.io https://api.deepseek.com https://*.metered.live https://www.google-analytics.com; frame-src 'self' https://meet.telemedicinaaloclinica.sbs http://72.62.138.208:3001 http://72.62.138.208:3200; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self' https://*.lovable.app https://*.lovable.dev https://aloclinica.com.br https://www.aloclinica.com.br" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;
    gzip_comp_level 6;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|webp|svg|ico|woff2|woff|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Health check endpoint
    location /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Block sensitive paths
    location ~* /\.env { deny all; return 404; }
    location ~* /\.git  { deny all; return 404; }
}
